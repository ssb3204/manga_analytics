version: 2

seeds:
  - name: benchmark_results
    description: "A/B 성능 테스트 원시 결과 — run_benchmarks.py가 생성"
    config:
      schema: benchmarks
      column_types:
        measured_at: string
    columns:
      - name: test_name
        description: "테스트 식별자 (materialization, partitioning)"
      - name: variant
        description: "A 또는 B"
      - name: run_number
        description: "실행 회차 (1~3)"
      - name: bytes_scanned
        description: "BigQuery total_bytes_processed"
      - name: slot_time_ms
        description: "BigQuery total_slot_ms"
      - name: execution_time_s
        description: "쿼리 실행 시간 (초)"
      - name: row_count
        description: "결과 행 수"
      - name: measured_at
        description: "측정 시각 (UTC)"
